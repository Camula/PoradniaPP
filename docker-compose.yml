services:
  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=poradnia_user
      - POSTGRES_PASSWORD=poradnia_password
      - POSTGRES_DB=poradnia_db
    volumes:
      - db-data:/var/lib/postgresql/data
    restart: always

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    depends_on:
      - db
    environment:
      - TZ=Europe/Warsaw
      - NODE_ENV=production
      - PORT=5000
      - DB_HOST=db
      - DB_USER=poradnia_user
      - DB_PASSWORD=poradnia_password
      - DB_NAME=poradnia_db
      - DB_PORT=5432
      - JWT_SECRET=poradnia_security_token_2026
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost:5000/api
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: always

volumes:
  db-data:
